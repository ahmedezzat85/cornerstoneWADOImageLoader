name: Migrate OpenJPEG WASM

on:
  repository_dispatch:
    types: [openjpeg-wasm-updated]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CODECS_BASE: https://raw.githubusercontent.com/ahmedezzat85/codecs/main/packages/openjpeg/dist

jobs:
  migrate:
    name: Migrate WASM + Verify Build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Pull WASM dist from codecs repo
        run: |
          mkdir -p /tmp/openjpeg-dist
          BASE=${{ env.CODECS_BASE }}
          FILES="openjpegwasm_decode.js openjpegwasm_decode.wasm openjpegjs_decode.js openjpegjs_decode.js.mem openjpegwasm.js openjpegwasm.wasm openjpegjs.js openjpegjs.js.mem"
          for f in $FILES; do
            echo "Downloading $f ..."
            curl -fsSL "$BASE/$f" -o "/tmp/openjpeg-dist/$f" && echo "  OK" || echo "  SKIP (not found)"
          done
          echo "--- Downloaded files ---"
          ls -lh /tmp/openjpeg-dist/

      - name: Patch node_modules and src
        run: |
          DIST=/tmp/openjpeg-dist

          NM_DEST=node_modules/@cornerstonejs/codec-openjpeg/dist
          mkdir -p $NM_DEST
          cp $DIST/*.js   $NM_DEST/ 2>/dev/null || true
          cp $DIST/*.wasm $NM_DEST/ 2>/dev/null || true
          cp $DIST/*.mem  $NM_DEST/ 2>/dev/null || true
          echo "--- node_modules patched ---"
          ls -lh $NM_DEST/

          SRC_DEST=src/codecs/openjpeg
          mkdir -p $SRC_DEST
          cp $DIST/*.js   $SRC_DEST/ 2>/dev/null || true
          cp $DIST/*.wasm $SRC_DEST/ 2>/dev/null || true
          cp $DIST/*.mem  $SRC_DEST/ 2>/dev/null || true

      - name: Build
        id: build
        run: |
          mkdir -p dist
          touch /tmp/build.log
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          cp /tmp/build.log dist/build.log
          echo "build_exit=$BUILD_EXIT" >> $GITHUB_OUTPUT
          exit $BUILD_EXIT

      - name: Diagnostics
        if: always()
        run: |
          echo "=== dist/ contents ==="
          ls -lh dist/ 2>/dev/null || echo "dist/ is empty"
          echo ""
          echo "=== Last 80 lines of build log ==="
          tail -n 80 /tmp/build.log 2>/dev/null || echo "No log"

      - name: Copy log to dist on failure
        if: always()
        run: |
          mkdir -p dist
          cp /tmp/build.log dist/build.log 2>/dev/null || true

      - name: Upload dist-bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundle
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Commit vendored WASM
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add src/codecs/openjpeg/
          if git diff --cached --quiet; then
            echo "No WASM changes - skipping commit."
          else
            git commit -m "ci: update vendored openjpeg WASM [skip ci]"
            git push origin master
          fi
