name: Migrate OpenJPEG WASM

on:
  repository_dispatch:
    types: [openjpeg-wasm-updated]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Codecs Actions run_id (leave blank to use latest)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: Migrate WASM + Verify Build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download openjpeg-wasm-dist artifact from codecs
        run: |
          mkdir -p /tmp/openjpeg-dist

          RUN_ID=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ahmedezzat85/codecs/actions/workflows/build-openjpeg.yml/runs?status=success&per_page=1&branch=main" \
            | jq -r '.workflow_runs[0].id')

          echo "Latest successful run ID: $RUN_ID"

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful run found - will fall back to raw URLs"
            exit 0
          fi

          ARTIFACT_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ahmedezzat85/codecs/actions/runs/$RUN_ID/artifacts" \
            | jq -r '.artifacts[] | select(.name=="openjpeg-wasm-dist") | .archive_download_url')

          echo "Artifact URL: $ARTIFACT_URL"

          if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
            echo "Artifact not found - will fall back to raw URLs"
            exit 0
          fi

          curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$ARTIFACT_URL" -o /tmp/openjpeg-dist.zip

          unzip -o /tmp/openjpeg-dist.zip -d /tmp/openjpeg-dist
          echo "--- Artifact contents ---"
          ls -lh /tmp/openjpeg-dist/

      - name: Copy WASM artifacts
        run: |
          DIST=/tmp/openjpeg-dist

          if [ ! -d "$DIST" ] || [ -z "$(ls -A $DIST 2>/dev/null)" ]; then
            echo "No artifact - falling back to raw URLs from codecs/main"
            mkdir -p $DIST
            BASE=https://raw.githubusercontent.com/ahmedezzat85/codecs/main/packages/openjpeg/dist
            for f in openjpegwasm_decode.js openjpegwasm_decode.wasm openjpegjs_decode.js openjpegjs_decode.js.mem openjpegwasm.js openjpegwasm.wasm openjpegjs.js openjpegjs.js.mem; do
              curl -fsSL $BASE/$f -o $DIST/$f 2>/dev/null && echo "downloaded $f" || echo "SKIP $f"
            done
          fi

          echo "--- Files to copy ---"
          ls -lh $DIST/

          NM_DEST=node_modules/@cornerstonejs/codec-openjpeg/dist
          mkdir -p $NM_DEST
          cp $DIST/*.js   $NM_DEST/ 2>/dev/null || true
          cp $DIST/*.wasm $NM_DEST/ 2>/dev/null || true
          cp $DIST/*.mem  $NM_DEST/ 2>/dev/null || true
          echo "node_modules patched:"
          ls -lh $NM_DEST/

          SRC_DEST=src/codecs/openjpeg
          mkdir -p $SRC_DEST
          cp $DIST/*.js   $SRC_DEST/ 2>/dev/null || true
          cp $DIST/*.wasm $SRC_DEST/ 2>/dev/null || true
          cp $DIST/*.mem  $SRC_DEST/ 2>/dev/null || true

      - name: Build
        id: build
        run: |
          touch /tmp/build.log
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build_exit=$BUILD_EXIT" >> $GITHUB_OUTPUT
          exit $BUILD_EXIT

      - name: Diagnostics
        if: always()
        run: |
          echo "=== dist/ contents ==="
          ls -lh dist/ 2>/dev/null || echo "dist/ does not exist or is empty"
          echo ""
          echo "=== Last 60 lines of build log ==="
          tail -n 60 /tmp/build.log 2>/dev/null || echo "No build log found"

      - name: Upload dist artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundle
          path: dist/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Commit vendored WASM
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add src/codecs/openjpeg/
          if git diff --cached --quiet; then
            echo "No changes to vendor - skipping commit."
          else
            git commit -m "ci: update vendored openjpeg WASM [skip ci]"
            git push origin master
          fi
