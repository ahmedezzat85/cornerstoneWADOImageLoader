name: Build Verify

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'package.json'
      - '.github/workflows/build-verify.yml'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
      - run: npm install
      - run: npm run build
